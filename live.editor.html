<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Genius Live Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; color: white; font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }
        .header { background: #1e293b; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 2px solid #38bdf8; }
        .container { display: flex; height: calc(100vh - 45px); }
        .editor-side { width: 50%; height: 100%; border-right: 2px solid #334155; display: flex; flex-direction: column; }
        .preview-side { width: 50%; height: 100%; background: white; }
        textarea { 
            width: 100%; height: 100%; background: #1e293b; color: #38bdf8; 
            padding: 20px; font-size: 16px; border: none; outline: none; resize: none;
            line-height: 1.5;
        }
        .label { background: #334155; padding: 5px 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <span style="color: #38bdf8; font-weight: bold;">LIVE CODE BUILDER</span>
        <span id="status" style="font-size: 12px;">Yozishni boshlang...</span>
    </div>

    <div class="container">
        <!-- Kod yozish qismi -->
        <div class="editor-side">
            <div class="label">HTML & CSS Kodini shu yerga yozing</div>
            <textarea id="code" placeholder="<html>
<body>
  <h1>Salom Aslbek!</h1>
  <style>
    h1 { color: red; text-align: center; }
  </style>
</body>
</html>"></textarea>
        </div>

        <!-- Natija ko'rinadigan qism -->
        <div class="preview-side">
            <div class="label" style="background: #e2e8f0; color: #475569;">Jonli Natija (Live Preview)</div>
            <iframe id="preview"></iframe>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('code');
        const preview = document.getElementById('preview').contentWindow.document;
        const status = document.getElementById('status');

        textarea.addEventListener('input', () => {
            const code = textarea.value;
            preview.open();
            preview.write(code);
            preview.close();
            status.innerText = "Yangilandi ✅";
            setTimeout(() => { status.innerText = "Kutilmoqda..."; }, 1000);
        });

        // Boshlang'ich ko'rinish
        window.onload = () => {
            textarea.value = "<html>\n<body style='font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 80vh; flex-direction: column;'>\n  <h1 style='color: #38bdf8;'>Live Editor Ishlamoqda!</h1>\n  <p>Kod yozing va natijani darhol ko'ring.</p>\n  <button style='padding: 10px 20px; background: #38bdf8; border: none; color: white; border-radius: 5px; margin-top: 20px;'>Tugma</button>\n</body>\n</html>";
            textarea.dispatchEvent(new Event('input'));
        };
    </script>
</body>
</html>
